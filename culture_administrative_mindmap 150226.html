<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culture Administrative — P. MAURIES</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f1a;
  --card-bg: #141829;
  --card-hover: #1a1f38;
  --accent-red: #e63946;
  --accent-blue: #457b9d;
  --accent-gold: #e9c46a;
  --accent-green: #2a9d8f;
  --accent-purple: #7b2cbf;
  --accent-orange: #f4845f;
  --accent-teal: #48bfe3;
  --accent-pink: #c77dff;
  --accent-cyan: #00b4d8;
  --accent-lime: #80b918;
  --text: #e8e8ef;
  --text-muted: #8e92a8;
  --border: rgba(255,255,255,0.06);
  --glow: rgba(230,57,70,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
  background: radial-gradient(ellipse at 20% 50%, rgba(230,57,70,0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 20%, rgba(69,123,157,0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(123,44,191,0.03) 0%, transparent 50%);
  animation: bgDrift 30s ease-in-out infinite alternate; z-index:0; pointer-events:none;
}
@keyframes bgDrift { 0%{transform:translate(0,0)} 100%{transform:translate(-3%,-2%)} }

.header { position:relative; z-index:1; text-align:center; padding:50px 20px 20px; }
.header h1 {
  font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3.5rem); font-weight:900;
  background:linear-gradient(135deg,var(--accent-red),var(--accent-gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:-1px; line-height:1.1;
}
.header .subtitle { color:var(--text-muted); font-size:0.95rem; margin-top:10px; letter-spacing:2px; text-transform:uppercase; }
.header .badge {
  display:inline-block; margin-top:14px; padding:6px 18px;
  background:rgba(230,57,70,0.12); border:1px solid rgba(230,57,70,0.25);
  border-radius:20px; color:var(--accent-red); font-size:0.8rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;
}

.search-wrap { position:relative; z-index:2; max-width:600px; margin:16px auto 10px; padding:0 20px; }
.search-wrap input {
  width:100%; padding:14px 20px 14px 48px; background:var(--card-bg); border:1px solid var(--border);
  border-radius:14px; color:var(--text); font-size:0.95rem; font-family:'DM Sans',sans-serif; outline:none;
  transition:border-color 0.3s,box-shadow 0.3s;
}
.search-wrap input:focus { border-color:var(--accent-red); box-shadow:0 0 20px var(--glow); }
.search-wrap svg { position:absolute; left:36px; top:50%; transform:translateY(-50%); width:18px; height:18px; stroke:var(--text-muted); fill:none; stroke-width:2; }

.stats-bar { position:relative; z-index:1; display:flex; justify-content:center; gap:30px; padding:12px 20px; flex-wrap:wrap; }
.stat { text-align:center; }
.stat .num { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--accent-gold); }
.stat .label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; }

.nav-tabs {
  position:relative; z-index:2; display:flex; flex-wrap:wrap; justify-content:center;
  gap:8px; padding:10px 20px; max-width:1400px; margin:0 auto;
}
.nav-tab {
  padding:10px 18px; border-radius:10px; font-size:0.75rem; font-weight:700;
  cursor:pointer; transition:all 0.3s; border:1px solid var(--border); background:var(--card-bg);
  color:var(--text-muted); letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap;
}
.nav-tab:hover { background:var(--card-hover); color:var(--text); }
.nav-tab.active { color:#fff; border-color:transparent; }

.content { position:relative; z-index:1; max-width:1400px; margin:16px auto; padding:0 20px 60px; }
.section { display:none; animation:fadeUp 0.4s ease; }
.section.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.section-title {
  font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700;
  margin-bottom:8px; padding-bottom:10px; border-bottom:2px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.section-title .icon {
  width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:1rem; flex-shrink:0;
}

/* INTRO BLOCK */
.section-intro {
  margin-bottom:22px; padding:18px 22px; border-radius:14px;
  background: rgba(255,255,255,0.025); border:1px solid var(--border);
  font-size:0.88rem; line-height:1.7; color:var(--text-muted);
}
.section-intro strong { color:var(--text); }
.section-intro .intro-label {
  display:inline-block; font-size:0.65rem; font-weight:700; text-transform:uppercase;
  letter-spacing:1.5px; padding:3px 10px; border-radius:6px; margin-bottom:10px;
}

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(350px,1fr)); gap:14px; }

.card {
  background:var(--card-bg); border:1px solid var(--border); border-radius:14px;
  overflow:hidden; transition:all 0.3s; cursor:pointer;
}
.card:hover { background:var(--card-hover); border-color:rgba(255,255,255,0.1); transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,0.3); }
.card-header {
  padding:14px 16px 10px; font-size:0.83rem; font-weight:600; color:var(--text); line-height:1.4;
  display:flex; align-items:flex-start; gap:10px;
}
.card-header .q-badge {
  flex-shrink:0; width:26px; height:26px; border-radius:6px;
  display:flex; align-items:center; justify-content:center; font-size:0.6rem; font-weight:700; color:#fff;
}
.card-body { max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
.card.open .card-body { max-height:800px; }
.card-body-inner { padding:0 16px 14px; }
.answer {
  padding:7px 11px; margin-bottom:5px; border-radius:8px; font-size:0.8rem; line-height:1.45;
  color:var(--text); border-left:3px solid; background:rgba(255,255,255,0.02);
}
.answer .check { margin-right:6px; font-weight:700; }

[data-color="red"] .section-title{color:var(--accent-red)} [data-color="red"] .q-badge,[data-color="red"] .icon{background:rgba(230,57,70,0.2);color:var(--accent-red)} [data-color="red"] .answer{border-color:var(--accent-red)} [data-color="red"].nav-tab.active{background:var(--accent-red)} [data-color="red"] .intro-label{background:rgba(230,57,70,0.15);color:var(--accent-red)}
[data-color="blue"] .section-title{color:var(--accent-blue)} [data-color="blue"] .q-badge,[data-color="blue"] .icon{background:rgba(69,123,157,0.2);color:var(--accent-blue)} [data-color="blue"] .answer{border-color:var(--accent-blue)} [data-color="blue"].nav-tab.active{background:var(--accent-blue)} [data-color="blue"] .intro-label{background:rgba(69,123,157,0.15);color:var(--accent-blue)}
[data-color="green"] .section-title{color:var(--accent-green)} [data-color="green"] .q-badge,[data-color="green"] .icon{background:rgba(42,157,143,0.2);color:var(--accent-green)} [data-color="green"] .answer{border-color:var(--accent-green)} [data-color="green"].nav-tab.active{background:var(--accent-green)} [data-color="green"] .intro-label{background:rgba(42,157,143,0.15);color:var(--accent-green)}
[data-color="purple"] .section-title{color:var(--accent-purple)} [data-color="purple"] .q-badge,[data-color="purple"] .icon{background:rgba(123,44,191,0.2);color:var(--accent-purple)} [data-color="purple"] .answer{border-color:var(--accent-purple)} [data-color="purple"].nav-tab.active{background:var(--accent-purple)} [data-color="purple"] .intro-label{background:rgba(123,44,191,0.15);color:var(--accent-purple)}
[data-color="orange"] .section-title{color:var(--accent-orange)} [data-color="orange"] .q-badge,[data-color="orange"] .icon{background:rgba(244,132,95,0.2);color:var(--accent-orange)} [data-color="orange"] .answer{border-color:var(--accent-orange)} [data-color="orange"].nav-tab.active{background:var(--accent-orange)} [data-color="orange"] .intro-label{background:rgba(244,132,95,0.15);color:var(--accent-orange)}
[data-color="teal"] .section-title{color:var(--accent-teal)} [data-color="teal"] .q-badge,[data-color="teal"] .icon{background:rgba(72,191,227,0.2);color:var(--accent-teal)} [data-color="teal"] .answer{border-color:var(--accent-teal)} [data-color="teal"].nav-tab.active{background:var(--accent-teal)} [data-color="teal"] .intro-label{background:rgba(72,191,227,0.15);color:var(--accent-teal)}
[data-color="gold"] .section-title{color:var(--accent-gold)} [data-color="gold"] .q-badge,[data-color="gold"] .icon{background:rgba(233,196,106,0.2);color:var(--accent-gold)} [data-color="gold"] .answer{border-color:var(--accent-gold)} [data-color="gold"].nav-tab.active{background:var(--accent-gold);color:#000} [data-color="gold"] .intro-label{background:rgba(233,196,106,0.15);color:var(--accent-gold)}
[data-color="pink"] .section-title{color:var(--accent-pink)} [data-color="pink"] .q-badge,[data-color="pink"] .icon{background:rgba(199,125,255,0.2);color:var(--accent-pink)} [data-color="pink"] .answer{border-color:var(--accent-pink)} [data-color="pink"].nav-tab.active{background:var(--accent-pink);color:#000} [data-color="pink"] .intro-label{background:rgba(199,125,255,0.15);color:var(--accent-pink)}

.toolbar { display:flex; justify-content:flex-end; gap:8px; margin-bottom:14px; }
.toolbar button {
  padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card-bg);
  color:var(--text-muted); font-size:0.72rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif;
  transition:all 0.2s; text-transform:uppercase; letter-spacing:0.5px;
}
.toolbar button:hover { background:var(--card-hover); color:var(--text); }
.counter-badge {
  display:inline-flex; align-items:center; justify-content:center; min-width:22px; height:20px;
  padding:0 5px; border-radius:6px; font-size:0.65rem; font-weight:700; margin-left:5px;
  background:rgba(255,255,255,0.1); color:var(--text-muted);
}
@media(max-width:768px) { .cards-grid{grid-template-columns:1fr} .stats-bar{gap:16px} }
</style>
</head>

<div class="header">
  <h1>Culture Administrative</h1>

<div class="search-wrap">

</div>

<div class="stats-bar">
  <div class="stat"><div class="num" id="totalQ">0</div><div class="label">Questions</div></div>

<script>
const DATA = [
  {
    id:"general",
    title:"Généralités & Cadre juridique",
    icon:"⚖️",
    color:"red",
    intro:`<strong>La hiérarchie des normes</strong> constitue le socle du droit français. Héritée de la pensée de <strong>Hans Kelsen</strong>, elle organise l'ensemble des règles juridiques en une pyramide au sommet de laquelle se trouve le <strong>bloc de constitutionnalité</strong> (Constitution de 1958, DDHC de 1789, Préambule de 1946, Charte de l'environnement de 2004). En dessous viennent le <strong>bloc conventionnel</strong> (traités, directives UE), le <strong>bloc législatif</strong> (lois organiques, lois ordinaires, ordonnances), puis le <strong>bloc réglementaire</strong> (décrets, arrêtés, circulaires).<br><br>
    Cette section couvre également les <strong>fondements de la responsabilité</strong> — civile (réparation du dommage) et pénale (répression de l'infraction) — dont la distinction est essentielle pour les sapeurs-pompiers professionnels, qui peuvent engager leur responsabilité personnelle même dans le cadre du service. La notion de <strong>faute personnelle non détachable du service</strong> est un classique du concours. On y retrouve aussi les <strong>grandes lois historiques</strong> (IVG 1975, abolition de la peine de mort 1981, associations 1901, congés payés 1936, accords de Grenelle 1968) et des thèmes d'actualité comme la <strong>COP 30</strong> prévue à Belém en 2025.`,
    questions:[
      {q:"Quelle est la particularité des DROM ?", a:["Un seul préfet est en place"]},
      {q:"Quelle norme est placée au plus haut de la pyramide de la hiérarchie des normes ?", a:["Un décret (piège — le bloc de constitutionnalité est au sommet)"]},
      {q:"Que prévoit la loi pour la confiance dans l'institution judiciaire de 2021 ?", a:["Des procès filmés à des fins pédagogiques","Renforcement du secret professionnel des avocats","Peines alourdies en cas de meurtre sur un policier"]},
      {q:"Par quels acteurs peuvent être créées les communes nouvelles ?", a:["L'ensemble des conseillers municipaux des communes fusionnées","2/3 des conseils municipaux des communes d'un même EPCI à fiscalité propre (représentant > 2/3 de la population)","Le préfet"]},
      {q:"Vote du budget d'un SIS ?", a:["Budgets adoptés à la majorité absolue des suffrages exprimés","Avant l'adoption, des recettes peuvent être encaissées et des dépenses engagées"]},
      {q:"Chronologie budgétaire ?", a:["DOB réalisé dans les 2 mois précédant le vote","Budget primitif voté avant le 15 avril","Avant le 30 avril si renouvellement de l'assemblée délibérante"]},
      {q:"COP 30 ?", a:["2025 à Belém au Brésil","Conférence internationale organisée par l'ONU","Traite des changements climatiques"]},
      {q:"Les TAAF sont classées en...", a:["Aucune réponse ne convient (Collectivité d'outre-mer à statut particulier)"]},
      {q:"Budget d'un SDIS ?", a:["Doit faire l'objet d'un DOB","Le budget primitif fixe l'essentiel des dépenses et recettes à l'exercice à venir"]},
      {q:"Loi Bachelot ?", a:["Loi de réforme de l'hôpital, relative aux patients, à la santé et aux territoires","Crée les ARS"]},
      {q:"Les trois pouvoirs ?", a:["Exécutif (Président de la République)","Législatif (AN + Sénat)","Judiciaire (Tribunaux)"]},
      {q:"Responsabilité civile et pénale ?", a:["Pénale → répression des infractions troublant l'ordre social","Civile → réparation des dommages causés à autrui"]},
      {q:"SPP détourne un véhicule de service → accident. Faute ?", a:["Personnelle mais non détachable du service"]},
      {q:"Hiérarchie des normes — bloc de constitutionnalité ?", a:["Constitution du 4 octobre 1958 (+ préambule)","DDHC de 1789","Préambule de la Constitution de 1946","Charte de l'environnement de 2004","Principes et objectifs de valeur constitutionnelle"]},
      {q:"Directive UE dans la hiérarchie des normes ?", a:["En dessous du bloc de constitutionnalité, dans le bloc conventionnel"]},
      {q:"Acte administratif ?", a:["Toute décision prise par une autorité administrative dans l'exercice de ses pouvoirs"]},
      {q:"Arrêtés ?", a:["Inférieur à un décret dans la hiérarchie des normes","Peut être réglementaire ou individuel","Peut émaner d'un président de Conseil départemental"]},
      {q:"Circulaires ?", a:["Texte permettant aux autorités administratives d'informer leurs services"]},
      {q:"Ordonnances ?", a:["Entrent en vigueur dès leur publication","Autorisées par le Parlement via loi d'habilitation","Mesure du Gouvernement dans le domaine de la loi"]},
      {q:"DDHC adoptée en quelle année ?", a:["Le 26 août 1789"]},
      {q:"Loi IVG ?", a:["Promulguée en 1975"]},
      {q:"Premiers congés payés ?", a:["1936"]},
      {q:"Abolition de la peine de mort ?", a:["1981 — Loi Badinter"]},
      {q:"Accords de Grenelle ?", a:["Avancées sociales suite aux événements de 1968"]},
      {q:"Loi du 1er juillet 1901 ?", a:["Consacrée aux associations à but non lucratif"]},
      {q:"Louvre-Lens ?", a:["Inauguré en 2012 à Lens"]},
      {q:"Sommet de la Terre à Rio ?", a:["1992"]},
      {q:"Pandémie selon l'OMS ?", a:["Infection partant d'une zone localisée puis s'étendant au monde entier"]},
      {q:"Transfert compétence eau aux EPCI ?", a:["1er janvier 2020"]},
      {q:"Couleurs du drapeau français ?", a:["Le bleu et le rouge représentent la ville de Paris"]},
      {q:"Symboles de la France ?", a:["Le drapeau bleu, blanc, rouge est inscrit dans la Constitution","La devise « Liberté, Égalité, Fraternité » figure dans la Constitution de 1958"]}
    ]
  },
  {
    id:"decentral",
    title:"Décentralisation & Déconcentration",
    icon:"🏛️",
    color:"blue",
    intro:`<strong>Décentralisation et déconcentration</strong> sont les deux grands modes d'organisation administrative de la France, et il est essentiel de ne pas les confondre au concours. La <strong>déconcentration</strong>, instaurée sous <strong>Napoléon</strong>, consiste à déléguer le pouvoir central à des représentants de l'État sur le terrain — le <strong>préfet</strong> en est la figure principale (représentant du Premier ministre et des membres du gouvernement dans le département). La <strong>décentralisation</strong>, quant à elle, transfère des compétences de l'État vers des <strong>collectivités territoriales</strong> autonomes (communes, départements, régions).<br><br>
    Le mouvement de décentralisation s'est construit en trois grandes étapes historiques : l'<strong>Acte I</strong> avec la <strong>loi Defferre de 1982</strong> (transfert de compétences, libertés des collectivités), l'<strong>Acte II</strong> en <strong>2003</strong> (inscription de la décentralisation dans la Constitution, autonomie financière des collectivités), puis l'<strong>Acte III</strong> sous la présidence de <strong>François Hollande</strong> avec trois lois majeures : la <strong>loi MAPTAM du 27 janvier 2014</strong> (création des métropoles, clause générale de compétence rétablie), la <strong>loi NOTRe du 7 août 2015</strong> (nouvelle carte régionale, renforcement des régions en développement économique et transport), et la <strong>loi du 16 décembre 2010</strong> (obligation d'adhésion des communes à un EPCI, création des communes nouvelles et des métropoles).<br><br>
    La répartition des compétences entre niveaux est un grand classique : les <strong>communes</strong> gèrent l'urbanisme, le logement et les écoles élémentaires (avec clause générale de compétence), les <strong>départements</strong> gèrent l'action sociale (RSA, personnes âgées, handicap), les collèges et la voirie départementale, les <strong>régions</strong> gèrent le développement économique, les lycées et l'aménagement du territoire. La <strong>culture et le tourisme</strong> sont des compétences partagées entre les trois échelons. La France compte aujourd'hui <strong>18 régions</strong>, <strong>101 départements</strong> (dont 5 DROM), et <strong>22 métropoles</strong>.`,
    questions:[
      {q:"La décentralisation ?", a:["Transfert de compétences de l'État vers des entités locales distinctes","Les collectivités territoriales sont des autorités décentralisées"]},
      {q:"La déconcentration ?", a:["Le préfet représente le 1er ministre et les membres du gouvernement","Pouvoir central attribué à un représentant de l'État au plan local","Napoléon est à l'origine de la déconcentration"]},
      {q:"Loi Defferre ?", a:["Droits et libertés des communes, départements et régions","Acte 1 de la décentralisation","Transfert de compétences (collèges, lycées)"]},
      {q:"Acte 2 de la décentralisation ?", a:["Inscrit la décentralisation dans la Constitution","Consacre l'autonomie financière des collectivités"]},
      {q:"Loi du 16 décembre 2010 ?", a:["Oblige chaque commune à adhérer à un EPCI","Loi de réforme des collectivités territoriales","Encourage les communes nouvelles","Crée les métropoles"]},
      {q:"Loi MAPTAM ?", a:["Adoptée le 27 janvier 2014","Rétablit la clause générale de compétence pour régions et départements","LOI n° 2014-58 — modernisation de l'action publique territoriale"]},
      {q:"Loi NOTRe — promulgation ?", a:["7 août 2015"]},
      {q:"Loi NOTRe — signification ?", a:["Nouvelle Organisation Territoriale de la République"]},
      {q:"Loi NOTRe — apports ?", a:["Renforce le rôle de la région (développement économique)","Transport transféré aux régions"]},
      {q:"Compétences des départements ?", a:["Aide sociale (personnes handicapées et âgées)","Infrastructures (ports, aérodromes)","Construction et entretien des collèges","RSA","Voirie départementale","Aménagement du territoire"]},
      {q:"Compétences des communes ?", a:["Gestion des écoles élémentaires","Logement","Urbanisme","Clause générale de compétence"]},
      {q:"Compétences des régions ?", a:["Développement économique","Aménagement du territoire","Gestion des lycées"]},
      {q:"Compétences partagées communes/départements/régions ?", a:["Gestion de la culture","Gestion du tourisme"]},
      {q:"Particularité de la Corse ?", a:["Collectivité à statut particulier","Collectivité territoriale","Exerce les compétences dévolues aux conseils départementaux","Compétences particulières fixées par le CGCT"]},
      {q:"EPCI ?", a:["Établissement Public de Coopération Intercommunale","Forme de coopération entre communes","Communauté de communes = EPCI"]},
      {q:"Affirmations sur les EPCI ?", a:["Syndicats d'agglomération nouvelle dissous","Communauté urbaine ≥ 250 000 habitants"]},
      {q:"Métropoles ?", a:["Créées par la loi du 16 décembre 2010","Modifiées par la loi MAPTAM","Compétences en développement économique","22 métropoles en France"]},
      {q:"Intercommunalité ?", a:["Les différentes formes de coopérations entre les communes"]},
      {q:"Loi 3DS ?", a:["Décentralisation","Différenciation","Déconcentration"]},

      {q:"Conseil départemental ?", a:["Le Président dispose du pouvoir exécutif","2 conseillers par canton (binôme femme-homme)"]},
      {q:"Président du conseil régional ?", a:["Élu par les conseillers régionaux à la majorité absolue","Élu pour 6 ans"]},
      {q:"CESER ?", a:["Conseil économique, social et environnemental régional","Saisi par le président du Conseil régional","Mission de consultation"]},
      {q:"SGAR ?", a:["Secrétariat général pour les affaires régionales","Sous l'autorité du préfet de région"]},
      {q:"DREETS ?", a:["Remplace la DIRECCTE","Direction Régionale de l'Économie, de l'Emploi, du Travail et des Solidarités"]},
      {q:"DRAJES ?", a:["Délégation régionale académique à la jeunesse, à l'engagement et au sport","Sous l'autorité du recteur de région académique"]},
      {q:"Recteur d'académie ?", a:["Nommé par le Président de la République","18 régions académiques"]},
      {q:"Ministre de l'Europe et des Affaires étrangères 2025 ?", a:["Jean-Noël Barrot"]},
      {q:"Hôtel de Bourvallais ?", a:["Ministère de la Justice, place Vendôme"]},
      {q:"Président de la 4e République ?", a:["Vincent Auriol"]},
      {q:"Président de la 5e République décédé en cours de mandat ?", a:["Georges Pompidou"]},
      {q:"Régions académiques en France ?", a:["18"]}
    ]
  },
  {
    id:"justice",
    title:"Justice, Juges & Juridictions",
    icon:"⚔️",
    color:"pink",
    intro:`L'organisation judiciaire française est construite autour d'un <strong>dualisme juridictionnel</strong> : l'<strong>ordre judiciaire</strong> (litiges entre personnes privées et infractions pénales) et l'<strong>ordre administratif</strong> (litiges impliquant l'administration). L'ordre judiciaire se subdivise en <strong>juridictions civiles</strong> et <strong>juridictions pénales</strong>. En matière pénale, la hiérarchie suit un ordre croissant de gravité : le <strong>tribunal de police</strong> (contraventions), le <strong>tribunal correctionnel</strong> (délits) et la <strong>cour d'assises</strong> (crimes). La <strong>cour d'appel</strong> réexamine les décisions, et la <strong>Cour de cassation</strong>, plus haute juridiction de l'ordre judiciaire, vérifie la bonne application du droit sans rejuger les faits.<br><br>
    Plusieurs magistrats spécialisés jouent des rôles clés à connaître pour le concours : le <strong>Procureur de la République</strong> est un magistrat du parquet (debout) qui ordonne et dirige les enquêtes, contrôle les gardes à vue et en autorise la prolongation — il est aussi officier de police judiciaire. Le <strong>juge d'instruction</strong>, magistrat du siège, est chargé des enquêtes dans les affaires pénales les plus graves et met en examen les suspects. Le <strong>juge des libertés et de la détention (JLD)</strong> ordonne ou prolonge la détention provisoire, autorise les mesures d'enquête attentatoires à la liberté et les visites domiciliaires dans le cadre de la prévention du terrorisme. Le <strong>juge de l'application des peines (JAP)</strong>, assisté du SPIP et de la Commission d'application des peines, aménage l'exécution des peines et peut révoquer les sursis avec mise à l'épreuve.<br><br>

      {q:"Rôle du juge de l'application des peines ?", a:["Assisté par le SPIP et la Commission d'application des peines","Peut révoquer les mesures de sursis avec mise à l'épreuve"]}

// Render
const navEl = document.getElementById('navTabs');
const contentEl = document.getElementById('content');
let totalQ=0, totalA=0;

DATA.forEach((sec,i)=>{
  totalQ += sec.questions.length;
  sec.questions.forEach(q => totalA += q.a.length);

  const tab = document.createElement('div');
  tab.className = 'nav-tab' + (i===0?' active':'');
  tab.setAttribute('data-color', sec.color);
  tab.innerHTML = sec.icon + ' ' + sec.title + `<span class="counter-badge">${sec.questions.length}</span>`;
  tab.onclick = () => switchTab(i);
  navEl.appendChild(tab);

  const section = document.createElement('div');
  section.className = 'section' + (i===0?' active':'');
  section.setAttribute('data-color', sec.color);
  section.id = 'section-'+sec.id;
  section.innerHTML = `
    <div class="section-title"><div class="icon">${sec.icon}</div>${sec.title}</div>
    <div class="section-intro">
      <div class="intro-label">Synthèse du thème</div>
      ${sec.intro}
    </div>
    <div class="toolbar">
      <button onclick="toggleAll('${sec.id}',true)">▼ Tout ouvrir</button>
      <button onclick="toggleAll('${sec.id}',false)">▲ Tout fermer</button>
    </div>
    <div class="cards-grid" id="grid-${sec.id}"></div>
  `;
  contentEl.appendChild(section);

  const grid = section.querySelector('.cards-grid');
  sec.questions.forEach((q,j) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-q', q.q.toLowerCase());
    card.setAttribute('data-a', q.a.join(' ').toLowerCase());
    card.innerHTML = `
      <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="q-badge">Q${j+1}</div>
        <div>${q.q}</div>
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          ${q.a.map(a=>`<div class="answer"><span class="check">✓</span>${a}</div>`).join('')}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
});

document.getElementById('totalQ').textContent = totalQ;
document.getElementById('totalS').textContent = DATA.length;
document.getElementById('totalA').textContent = totalA;

function switchTab(idx){
  document.querySelectorAll('.nav-tab').forEach((t,i)=> t.classList.toggle('active', i===idx));
  document.querySelectorAll('.section').forEach((s,i)=> s.classList.toggle('active', i===idx));
}
function toggleAll(secId, open){
  document.querySelectorAll(`#grid-${secId} .card`).forEach(c=>{
    if(open) c.classList.add('open'); else c.classList.remove('open');
  });
}

document.getElementById('searchInput').addEventListener('input', function(){
  const term = this.value.toLowerCase().trim();
  if(!term){
    document.querySelectorAll('.section').forEach(s=>s.style.display='');
    document.querySelectorAll('.card').forEach(c=>{c.style.display=''; c.classList.remove('open');});
    document.querySelectorAll('.nav-tab').forEach(t=>t.style.display='');
    document.querySelectorAll('.section-intro').forEach(el=>el.style.display='');
    switchTab(0);
    return;
  }
  document.querySelectorAll('.section').forEach(s=>{s.classList.add('active'); s.style.display='block';});
  document.querySelectorAll('.nav-tab').forEach(t=>t.style.display='none');
  document.querySelectorAll('.section-intro').forEach(el=>el.style.display='none');
  document.querySelectorAll('.card').forEach(c=>{
    const qText = c.getAttribute('data-q');
    const aText = c.getAttribute('data-a');
    if(qText.includes(term) || aText.includes(term)){
      c.style.display=''; c.classList.add('open');
    } else { c.style.display='none'; }
  });
  document.querySelectorAll('.section').forEach(s=>{
    let hasVisible = false;
    s.querySelectorAll('.card').forEach(c=>{ if(c.style.display !== 'none') hasVisible = true; });
    s.style.display = hasVisible ? 'block' : 'none';
  });
});
</script>
</body>
</html>
